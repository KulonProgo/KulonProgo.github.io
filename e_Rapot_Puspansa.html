<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>e-Rapot PUSPANSA</title>

<meta name="theme-color" content="#1e3a8a">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#020617;
}

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;

background:radial-gradient(circle at top,#1e3a8a,#020617 70%);
transition:.5s;
}

.hide{
opacity:0;
visibility:hidden;
}

.card{
width:90%;
max-width:360px;
padding:35px 25px;
text-align:center;
border-radius:30px;

background:rgba(59,130,246,.08);
backdrop-filter:blur(20px);
border:1px solid #3b82f633;

color:#eff6ff;
box-shadow:0 20px 60px #0008;
}

/* =====================
   RAPOT ANIMATION
===================== */

.icon{
width:120px;
height:120px;
margin:auto;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* buku */

.book{
width:80px;
height:100px;
background:#1e40af;
border-radius:6px;
position:relative;
box-shadow:0 10px 30px #0008;
animation:float 2s ease-in-out infinite;
}

.book::before{
content:"";
position:absolute;
left:8px;
top:0;
width:4px;
height:100%;
background:#93c5fd;
}

/* checklist */

.check{
position:absolute;
width:20px;
height:20px;
border-radius:50%;
background:#22c55e;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:12px;
font-weight:bold;

animation:pop 1.5s infinite;
}

.check:nth-child(2){
top:20px;
right:-10px;
animation-delay:.3s;
}

.check:nth-child(3){
top:50px;
right:-10px;
animation-delay:.6s;
}

.check:nth-child(4){
top:80px;
right:-10px;
animation-delay:.9s;
}

/* animasi */

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes pop{
0%{transform:scale(0);opacity:0;}
50%{transform:scale(1.2);opacity:1;}
100%{transform:scale(1);opacity:1;}
}

/* TEXT */

h1{
margin-top:20px;
font-size:28px;
letter-spacing:2px;
color:#93c5fd;
}

p{
margin-top:12px;
color:#dbeafe;
line-height:1.6;
}

.location{
margin-top:18px;
font-size:13px;
letter-spacing:3px;
color:#60a5fa;
}

/* PROGRESS */

.progress{
margin-top:25px;
height:7px;
border-radius:20px;
background:#1e3a8a;
overflow:hidden;
}

.bar{
height:100%;
width:40%;
background:#3b82f6;
animation:load 1.2s infinite;
}

@keyframes load{
0%{transform:translateX(-120%)}
100%{transform:translateX(300%)}
}

</style>

</head>

<body>

<!-- IFRAME -->

<iframe
id="app"
src="https://script.google.com/a/~/macros/s/AKfycbyWKNYiwCSot4JA6sgPyD4f1ep6g6w-OEzEO7PvesuR0TLifItN6Lf3MFZ8i-mBtU3dEw/exec"
allow="geolocation *;camera *;microphone *"
loading="eager">
</iframe>

<!-- LOADING -->

<div id="loader">

<div class="card">

<div class="icon">

<div class="book"></div>

<div class="check">✓</div>
<div class="check">✓</div>
<div class="check">✓</div>

</div>

<h1>e-RAPOT</h1>

<p>
PUSPANSA<br>
Presensi • TPP • Kompetensi
</p>

<div class="location">
PUSKESMAS PANJATAN I
</div>

<div class="progress">
<div class="bar"></div>
</div>

<p>
Memuat penilaian pegawai...
</p>

</div>

</div>

<script>

const loader = document.getElementById("loader");

document.getElementById("app").onload=function(){
setTimeout(()=>{
loader.classList.add("hide");
},300);
};

// fallback
setTimeout(()=>{
loader.classList.add("hide");
},6000);

</script>

</body>
</html>
