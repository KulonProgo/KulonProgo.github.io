<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>e-Logbook Catatan Kerja Puskesmas Panjatan I</title>
  <link rel="icon" href="https://i1.wp.com/www.freepnglogos.com/uploads/logo-puskesmas-png/logo-puskesmas-terbaru-sesuai-permenkes-tahun-1.png" type="image/png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background-color: #f4f9f8;
    }
    .iframe-container {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh; /* Adaptif untuk mobile */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* Animasi Loader yang lebih rapi */
    .loader-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #20c997;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loader-text {
      font-size: 1rem;
      font-weight: bold;
      color: #20c997;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader-wrapper" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Memuat Aplikasi...</div>
    </div>
    
    <!-- Iframe dikosongkan src-nya di awal -->
    <iframe 
      id="app-frame"
      title="e-Logbook Catatan Kerja Puspansa"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    // Link Google Apps Script Anda
    const gasUrl = "https://script.google.com/macros/s/AKfycbx29qTbWl7H1qwxiXSQlzuAm6z0hi5T6LHLbkoyBHLJhAQg3MvtIP21S6XgzyDAnHB7/exec";
    
    // Trik Anti-Cache: Menambahkan waktu saat ini di belakang URL
    // Ini memaksa browser mengira ini adalah link baru sehingga selalu mengambil versi terbaru
    const noCacheUrl = gasUrl + "?t=" + new Date().getTime();
    
    const iframe = document.getElementById('app-frame');
    const loader = document.getElementById('loader');

    // Sembunyikan loader saat iframe selesai dimuat
    iframe.onload = function() {
      loader.style.opacity = "0";
      setTimeout(() => { loader.style.display = "none"; }, 500);
    };

    // Muat URL ke dalam iframe
    iframe.src = noCacheUrl;
  </script>
</body>
</html>
