<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">


<title>
e-PAMAN PANJI | Planning & Management System
</title>


<link rel="preconnect" href="https://script.google.com">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:#020617;

}



.iframe-container{

position:fixed;

inset:0;

}



iframe{

position:absolute;

inset:0;

width:100%;

height:100%;

border:0;

}





/* SPLASH */


.loader-screen{


position:fixed;

inset:0;

z-index:9999;


display:flex;

align-items:center;

justify-content:center;


background:

radial-gradient(
circle at top,
#0f766e,
#020617 60%
);



transition:.5s;


}



.fade-out{

opacity:0;

visibility:hidden;

}





.loader-card{


width:90%;

max-width:390px;


padding:35px 25px;


text-align:center;


border-radius:30px;


background:

rgba(255,255,255,.08);


border:

1px solid rgba(255,255,255,.15);



backdrop-filter:

blur(20px);



box-shadow:

0 20px 60px #0008;


color:white;


}







/* FUTURE ICON */


.future-icon{


width:90px;

height:90px;


margin:auto;



border-radius:28px;



display:flex;

align-items:center;

justify-content:center;



background:

linear-gradient(
135deg,
#06b6d4,
#10b981
);



box-shadow:

0 15px 40px #06b6d466;


animation:

float 3s infinite;


}



.future-icon svg{


width:55px;

height:55px;

fill:white;


}



@keyframes float{


50%{

transform:translateY(-8px);

}


}







.app-title{


margin-top:20px;


font-size:30px;


font-weight:800;



letter-spacing:.5px;


}





.app-subtitle{


margin-top:12px;


font-size:15px;


line-height:1.7;


color:#ccfbf1;


}




.app-location{


margin-top:14px;


font-size:13px;


letter-spacing:2px;


color:#67e8f9;


font-weight:700;


}





.tagline{


margin-top:14px;


font-size:13px;


font-style:italic;


color:#a7f3d0;


}





.progress{


margin-top:25px;


height:7px;


background:#ffffff22;


border-radius:20px;


overflow:hidden;


}




.progress-bar{


height:100%;


width:35%;



background:

linear-gradient(
90deg,
#22d3ee,
#34d399
);



animation:

loading 1.3s infinite;


}





@keyframes loading{


0%{

transform:translateX(-120%);

}


100%{

transform:translateX(300%);

}


}






.loading-text{


margin-top:15px;


font-size:13px;


color:#d1fae5;


}






@media(max-width:600px){


.loader-card{

max-width:320px;

}



.app-title{

font-size:26px;

}


}



</style>


</head>


<body>



<div class="iframe-container">



<div class="loader-screen" id="loader">



<div class="loader-card">





<div class="future-icon">


<!-- ICON FUTURISTIC -->

<svg viewBox="0 0 24 24">


<path d="
M4 4h16v16H4V4zm3 10h2V8H7v6zm4 0h2V5h-2v9zm4 0h2v-4h-2v4z"/>


</svg>



</div>





<div class="app-title">

e-PAMAN PANJI

</div>





<div class="app-subtitle">

Sistem PerencanaAn & MANajemen<br>

Puskesmas PANJatan I

</div>





<div class="app-location">

DIGITAL COMMAND CENTER

</div>





<div class="tagline">

Planning • Monitoring • Evaluation • Performance

</div>





<div class="progress">

<div class="progress-bar"></div>

</div>





<div class="loading-text" id="status">

Menyiapkan sistem manajemen...

</div>




</div>


</div>






<iframe

id="appFrame"

src="https://script.google.com/a/~/macros/s/AKfycbwcDQ1HOB4hhZSFECOUVVcBtm4ShpQDL835EtN-Vmnyu_ybXusOjURQGk96LU0551Ingg/exec"


allow="geolocation *; camera *; microphone *"


loading="eager"


allowfullscreen>

</iframe>




</div>






<script>



const loader =
document.getElementById("loader");




function hideLoader(){


setTimeout(()=>{


loader.classList.add("fade-out");


},300);


}




document
.getElementById("appFrame")
.onload=function(){


hideLoader();


};




// anti loading forever

setTimeout(()=>{


hideLoader();


document.getElementById("status").innerHTML =
"Sistem siap digunakan";


},6000);



</script>




</body>
</html>
