<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>
SIGAP | Sistem Informasi Gawai Absensi Presensi Pegawai
</title>

<link rel="preconnect" href="https://script.google.com">
<link rel="dns-prefetch" href="//script.google.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#ffffff;
}

body{
position:fixed;
inset:0;
}

.iframe-container{
position:fixed;
inset:0;
width:100vw;
height:100dvh;
overflow:hidden;
background:#ffffff;
}

iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:block;
background:#ffffff;
}

/* =========================
   SPLASH SCREEN
========================= */

.loader-screen{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1d4ed8
);

z-index:9999;

transition:
opacity .4s ease,
visibility .4s ease;
}

/* CARD */

.loader-card{

width:90%;
max-width:380px;

padding:36px 28px;

border-radius:28px;

text-align:center;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 15px 50px rgba(0,0,0,.35);
}

/* =========================
   RADAR GEOFENCE
========================= */

.radar{

position:relative;

width:160px;
height:160px;

margin:auto;
margin-bottom:20px;
}

.radar-circle{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

border-radius:50%;

border:
2px solid rgba(56,189,248,.35);
}

.c1{
width:60px;
height:60px;
}

.c2{
width:105px;
height:105px;
}

.c3{
width:150px;
height:150px;
}

.radar-center{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:60px;
height:60px;

border-radius:50%;

background:
linear-gradient(
135deg,
#38bdf8,
#2563eb
);

display:flex;
align-items:center;
justify-content:center;

font-size:1.8rem;
font-weight:bold;

color:white;

box-shadow:
0 0 30px rgba(56,189,248,.8);
}

.radar-line{

position:absolute;

top:50%;
left:50%;

width:75px;
height:3px;

background:
linear-gradient(
90deg,
#7dd3fc,
transparent
);

transform-origin:left center;

animation:
scan 3s linear infinite;
}

@keyframes scan{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* =========================
   TEXT
========================= */

.app-title{

font-size:2rem;
font-weight:700;

color:white;

letter-spacing:1px;
}

.app-subtitle{

margin-top:10px;

font-size:.95rem;

line-height:1.7;

color:#dbeafe;
}

.app-location{

margin-top:10px;

font-size:.82rem;

letter-spacing:1.5px;

font-weight:600;

text-transform:uppercase;

color:#7dd3fc;
}

.tagline{

margin-top:14px;

font-size:.85rem;

color:#cbd5e1;
}

/* =========================
   PROGRESS
========================= */

.progress{

margin-top:24px;

height:6px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.15);
}

.progress-bar{

width:100%;
height:100%;

background:
linear-gradient(
90deg,
#38bdf8,
#60a5fa,
#38bdf8
);

background-size:200% 100%;

animation:
loading 1.2s linear infinite;
}

@keyframes loading{

0%{
background-position:0% 50%;
}

100%{
background-position:200% 50%;
}

}

.loading-text{

margin-top:14px;

font-size:.85rem;

color:#e2e8f0;
}

/* FADE */

.fade-out{

opacity:0;
visibility:hidden;
pointer-events:none;
}

/* MOBILE */

@media(max-width:600px){

.loader-card{
max-width:330px;
padding:28px 20px;
}

.radar{
width:130px;
height:130px;
}

.c1{
width:50px;
height:50px;
}

.c2{
width:85px;
height:85px;
}

.c3{
width:120px;
height:120px;
}

.radar-center{
width:50px;
height:50px;
font-size:1.4rem;
}

.radar-line{
width:60px;
}

.app-title{
font-size:1.6rem;
}

}

</style>

</head>

<body>

<div class="iframe-container">

<div class="loader-screen" id="loader">

<div class="loader-card">

<div class="radar">

<div class="radar-circle c1"></div>
<div class="radar-circle c2"></div>
<div class="radar-circle c3"></div>

<div class="radar-center">
✓
</div>

<div class="radar-line"></div>

</div>

<div class="app-title">
SIGAP
</div>

<div class="app-subtitle">
Sistem Informasi Gawai<br>
Absensi Presensi Pegawai
</div>

<div class="app-location">
PUSKESMAS PANJATAN I
</div>

<div class="tagline">
Presensi Digital Berbasis Lokasi (Geofence)
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="loading-text">
Memverifikasi lokasi perangkat...
</div>

</div>

</div>

<iframe
id="appFrame"
src="https://script.google.com/a/~/macros/s/AKfycbxMslHJzbFSpyqL9CQVP5_3yEI4iAuxlVwoLDhrIQlJYlAnw3BYTnApwQSLMLcHjhDy/exec"
allow="geolocation *; camera *; microphone *"
sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads"
loading="eager"
referrerpolicy="no-referrer"
allowfullscreen
onload="hideLoader()">
</iframe>

</div>

<script>

function hideLoader(){

setTimeout(()=>{

document
.getElementById('loader')
.classList.add('fade-out');

},300);

}

</script>

</body>
</html>
