<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:#020617;

}


iframe{

position:fixed;
inset:0;

width:100%;
height:100%;

border:0;

}




/* SPLASH */

#loader{

position:fixed;
inset:0;

z-index:9999;

display:flex;
align-items:center;
justify-content:center;


background:

radial-gradient(
circle at top,
#2563eb,
#020617 70%
);


transition:.4s;

}



.hide{

opacity:0;
visibility:hidden;

}





.card{


width:90%;
max-width:360px;

padding:35px 25px;


text-align:center;

border-radius:30px;


background:

rgba(255,255,255,.1);


backdrop-filter:blur(20px);


border:1px solid #ffffff22;


color:white;

box-shadow:

0 20px 60px #0008;


}





.icon{


width:90px;
height:90px;


margin:auto;


border-radius:28px;


display:flex;
justify-content:center;
align-items:center;


background:

linear-gradient(
135deg,
#38bdf8,
#2563eb
);



box-shadow:

0 0 40px #2563eb88;

}



.icon svg{

width:55px;
fill:white;

}




h1{

margin-top:20px;

font-size:32px;

}



p{

margin-top:12px;

color:#dbeafe;

line-height:1.6;

}



.location{

margin-top:15px;

font-size:13px;

letter-spacing:2px;

color:#7dd3fc;

}





.progress{

margin-top:25px;

height:7px;

border-radius:20px;

background:#ffffff33;

overflow:hidden;

}



.bar{

height:100%;

width:40%;


background:white;


animation:

load 1.2s infinite;


}



@keyframes load{


0%{

transform:translateX(-120%)

}


100%{

transform:translateX(300%)

}


}



</style>


</head>

<iframe

id="app"

src="https://script.google.com/a/~/macros/s/AKfycbxMslHJzbFSpyqL9CQVP5_3yEI4iAuxlVwoLDhrIQlJYlAnw3BYTnApwQSLMLcHjhDy/exec"

</p>


</div>


</div>






<script>


const loader =
document.getElementById("loader");


document
.getElementById("app")
.onload=function(){


setTimeout(()=>{

loader.classList.add("hide");

},300);


};



// anti loading

setTimeout(()=>{

loader.classList.add("hide");

},6000);




// PWA

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}


</script>
