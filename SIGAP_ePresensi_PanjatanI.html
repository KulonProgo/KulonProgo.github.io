<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>SIGAP | Sistem Informasi Gawai Presensi Pegawai</title>

<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SIGAP">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://script.google.com">
<link rel="dns-prefetch" href="//script.google.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'Segoe UI',sans-serif;}
body{position:fixed;inset:0;}
.iframe-container{position:fixed;inset:0;width:100vw;height:100dvh;background:#fff;overflow:hidden;}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block;background:#fff;}

.loader-screen{
position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
z-index:9999;transition:opacity .4s ease,visibility .4s ease;
}

.loader-card{
width:90%;max-width:360px;padding:30px 24px;text-align:center;border-radius:26px;
background:rgba(255,255,255,.08);backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.10);
box-shadow:0 15px 40px rgba(0,0,0,.30);
}

.location-loader{position:relative;width:120px;height:120px;margin:auto;margin-bottom:20px;}
.ring{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
border-radius:50%;
border:2px solid rgba(96,165,250,.30);
}
.ring1{width:50px;height:50px;animation:pulse 2s infinite;}
.ring2{width:80px;height:80px;animation:pulse 2s infinite .5s;}
.ring3{width:110px;height:110px;animation:pulse 2s infinite 1s;}

.core{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
width:60px;height:60px;border-radius:50%;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
display:flex;justify-content:center;align-items:center;
font-size:26px;font-weight:700;color:#fff;
box-shadow:0 0 25px rgba(59,130,246,.8);
}

@keyframes pulse{
0%{opacity:1;}
100%{transform:translate(-50%,-50%) scale(1.7);opacity:0;}
}

.app-title{font-size:2rem;font-weight:700;color:#fff;}
.app-subtitle{margin-top:10px;font-size:.95rem;line-height:1.6;color:#dbeafe;}
.app-location{margin-top:10px;font-size:.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#93c5fd;}
.tagline{margin-top:12px;font-size:.82rem;font-style:italic;color:#e2e8f0;}

.progress{
margin-top:22px;height:6px;border-radius:99px;overflow:hidden;
background:rgba(255,255,255,.15);
}
.progress-bar{
width:100%;height:100%;
background:linear-gradient(90deg,#60a5fa,#3b82f6,#60a5fa);
background-size:200% 100%;
animation:move 1.2s linear infinite;
}
@keyframes move{
0%{background-position:0% 50%;}
100%{background-position:200% 50%;}
}

.loading-text{margin-top:14px;font-size:.85rem;color:#cbd5e1;}
.fade-out{opacity:0;visibility:hidden;pointer-events:none;}

/* HOME BUTTON */
.home-btn{
position:fixed;
bottom:20px;
right:20px;
width:58px;
height:58px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
text-decoration:none;
box-shadow:0 10px 25px rgba(37,99,235,.35);
z-index:999999;
transition:.25s;
}
.home-btn:hover{transform:scale(1.08);}
.home-btn:active{transform:scale(.95);}
.home-btn svg{width:28px;height:28px;}

@media(max-width:600px){
.loader-card{max-width:320px;padding:24px 18px;}
.app-title{font-size:1.6rem;}
.app-subtitle{font-size:.85rem;}
}
</style>
</head>
<body>

<div class="iframe-container">

<div class="loader-screen" id="loader">
<div class="loader-card">

<div class="location-loader">
<div class="ring ring1"></div>
<div class="ring ring2"></div>
<div class="ring ring3"></div>
<div class="core">⌖</div>
</div>

<div class="app-title">SIGAP</div>

<div class="app-subtitle">
Sistem Informasi Gawai<br>
Presensi Pegawai
</div>

<div class="app-location">PUSKESMAS PANJATAN I</div>

<div class="tagline">
Presensi Digital • Berbasis Lokasi • Real Time
</div>

<div class="progress"><div class="progress-bar"></div></div>

<div class="loading-text">
Menghubungkan sistem presensi berbasis lokasi...
</div>

</div>
</div>

<iframe
id="appFrame"
src="https://script.google.com/a/~/macros/s/AKfycbxMslHJzbFSpyqL9CQVP5_3yEI4iAuxlVwoLDhrIQlJYlAnw3BYTnApwQSLMLcHjhDy/exec"
allow="geolocation *; camera *; microphone *"
sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads"
loading="eager"
referrerpolicy="no-referrer"
allowfullscreen
onload="hideLoader()"></iframe>

</div>

<a class="home-btn"
href="https://kulonprogo.github.io/e-PortalDigital-PanjatanSiji.html"
title="Portal Digital">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M3 10.5L12 3l9 7.5"/>
<path d="M5 9.5V21h14V9.5"/>
</svg>
</a>

<script>
function hideLoader(){
setTimeout(()=>{
document.getElementById('loader').classList.add('fade-out');
},300);
}

if('serviceWorker' in navigator){
window.addEventListener('load',()=>{
navigator.serviceWorker.register('/sw.js').catch(err=>console.log(err));
});
}
</script>

</body>
</html>
