<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>SIGAP | Absensi Presensi Pegawai</title>

<link rel="preconnect" href="https://script.google.com">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


html,body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Segoe UI',sans-serif;

background:#fff;

}


.iframe-container{

position:fixed;

inset:0;

width:100vw;

height:100dvh;

}


iframe{

position:absolute;

inset:0;

width:100%;

height:100%;

border:0;

}



/* SPLASH */


.loader-screen{

position:fixed;

inset:0;

z-index:9999;

display:flex;

align-items:center;

justify-content:center;

background:

linear-gradient(
135deg,
#020617,
#1e3a8a,
#2563eb
);


transition:.4s;

}


.fade-out{

opacity:0;

visibility:hidden;

}



/* CARD */


.loader-card{


width:90%;

max-width:340px;

padding:32px 25px;

border-radius:28px;

text-align:center;


background:

rgba(255,255,255,.12);


backdrop-filter:blur(18px);


box-shadow:

0 20px 50px #0005;

color:white;


}



/* ICON */


.app-icon{


width:85px;

height:85px;

margin:auto;


border-radius:25px;


display:flex;

align-items:center;

justify-content:center;


background:

linear-gradient(
135deg,
#38bdf8,
#2563eb
);


box-shadow:

0 15px 35px #0005;


}


.app-icon svg{

width:48px;

height:48px;

fill:white;

}




.app-title{


margin-top:18px;

font-size:30px;

font-weight:800;


}



.app-subtitle{


margin-top:10px;

line-height:1.6;

color:#dbeafe;

font-size:15px;

}



.app-location{


margin-top:12px;

font-size:13px;

letter-spacing:2px;

font-weight:600;

color:#7dd3fc;

}




/* progress */


.progress{


height:6px;

margin-top:25px;

background:#ffffff33;

border-radius:20px;

overflow:hidden;


}


.progress-bar{


height:100%;

width:40%;


background:white;


animation:

load 1.3s infinite;


}


@keyframes load{


0%{

transform:translateX(-120%);

}


100%{

transform:translateX(300%);

}


}



.loading-text{


margin-top:15px;

font-size:13px;

color:#cbd5e1;

}




@media(max-width:600px){


.loader-card{

max-width:300px;

padding:25px 18px;

}



.app-title{

font-size:26px;

}

}


</style>


</head>



<body>



<div class="iframe-container">



<div class="loader-screen" id="loader">



<div class="loader-card">



<div class="app-icon">


<!-- ICON MODERN -->

<svg viewBox="0 0 24 24">

<path d="
M12 2a8 8 0 00-8 8c0 5.5 8 12 8 12s8-6.5 8-12a8 8 0 00-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/>

</svg>


</div>




<div class="app-title">
SIGAP
</div>



<div class="app-subtitle">

Sistem Informasi Gawai<br>

Absensi Presensi Pegawai

</div>




<div class="app-location">

PUSKESMAS PANJATAN I

</div>




<div class="progress">

<div class="progress-bar"></div>

</div>



<div class="loading-text" id="status">

Menghubungkan sistem presensi...

</div>



</div>


</div>





<iframe

id="appFrame"

src="https://script.google.com/a/~/macros/s/AKfycbxMslHJzbFSpyqL9CQVP5_3yEI4iAuxlVwoLDhrIQlJYlAnw3BYTnApwQSLMLcHjhDy/exec"


allow="geolocation *; camera *; microphone *"

loading="eager"

allowfullscreen>

</iframe>



</div>





<script>


const loader =
document.getElementById("loader");



function hideLoader(){


setTimeout(()=>{


loader.classList.add("fade-out");


},300);


}





document

.getElementById("appFrame")

.onload=function(){


hideLoader();


};




// anti loading selamanya


setTimeout(()=>{


hideLoader();


document.getElementById("status").innerHTML=

"Aplikasi siap digunakan";


},6000);



</script>



</body>

</html>
