<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">

<title>
SIGAP | Sistem Informasi Gawai Absensi Presensi Pegawai
</title>

<meta name="theme-color" content="#2563eb">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="SIGAP">

<link rel="preconnect" href="https://script.google.com">
<link rel="dns-prefetch" href="//script.google.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:#ffffff;
font-family:'Segoe UI',sans-serif;
}

body{
position:fixed;
inset:0;
}

.iframe-container{
position:fixed;
inset:0;
width:100vw;
height:100dvh;
background:#ffffff;
overflow:hidden;
}

iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:block;
background:#ffffff;
}

/* SPLASH SCREEN */

.loader-screen{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1d4ed8
);

z-index:9999;

transition:
opacity .4s ease,
visibility .4s ease;
}

/* CARD */

.loader-card{

width:90%;
max-width:340px;

padding:34px 24px;

text-align:center;

border-radius:24px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,.10);

box-shadow:
0 15px 40px rgba(0,0,0,.25);
}

/* DIGITAL LOADER */

.digital-loader{

position:relative;

width:120px;
height:120px;

margin:auto;
margin-bottom:20px;
}

.ring{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

border-radius:50%;

border:2px solid rgba(59,130,246,.35);
}

.ring1{
width:50px;
height:50px;
animation:pulse 2s infinite;
}

.ring2{
width:80px;
height:80px;
animation:pulse 2s infinite .5s;
}

.ring3{
width:110px;
height:110px;
animation:pulse 2s infinite 1s;
}

.core{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:58px;
height:58px;

border-radius:50%;

background:
linear-gradient(
135deg,
#38bdf8,
#2563eb
);

display:flex;
justify-content:center;
align-items:center;

color:white;

font-size:24px;
font-weight:700;

box-shadow:
0 0 25px rgba(59,130,246,.8);
}

@keyframes pulse{

0%{
opacity:1;
}

100%{

transform:
translate(-50%,-50%)
scale(1.7);

opacity:0;
}

}

/* TEXT */

.app-title{

font-size:1.9rem;
font-weight:700;

color:#ffffff;
}

.app-subtitle{

margin-top:10px;

font-size:.92rem;

line-height:1.6;

color:#dbeafe;
}

.app-location{

margin-top:8px;

font-size:.8rem;

font-weight:600;

letter-spacing:1px;

color:#7dd3fc;

text-transform:uppercase;
}

/* PROGRESS */

.progress{

margin-top:22px;

height:6px;

border-radius:99px;

overflow:hidden;

background:
rgba(255,255,255,.15);
}

.progress-bar{

width:100%;
height:100%;

background:
linear-gradient(
90deg,
#38bdf8,
#60a5fa,
#38bdf8
);

background-size:200% 100%;

animation:move 1.2s linear infinite;
}

@keyframes move{

0%{
background-position:0% 50%;
}

100%{
background-position:200% 50%;
}

}

.loading-text{

margin-top:14px;

font-size:.85rem;

color:#cbd5e1;
}

.fade-out{

opacity:0;
visibility:hidden;
pointer-events:none;
}

/* MOBILE */

@media(max-width:600px){

.loader-card{
max-width:300px;
padding:24px 18px;
}

.app-title{
font-size:1.6rem;
}

.app-subtitle{
font-size:.85rem;
}

}

</style>

</head>

<body>

<div class="iframe-container">

<div class="loader-screen" id="loader">

<div class="loader-card">

<div class="digital-loader">

<div class="ring ring1"></div>
<div class="ring ring2"></div>
<div class="ring ring3"></div>

<div class="core">
✓
</div>

</div>

<div class="app-title">
SIGAP
</div>

<div class="app-subtitle">
Sistem Informasi Gawai<br>
Absensi Presensi Pegawai
</div>

<div class="app-location">
Puskesmas Panjatan I
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="loading-text">
Sinkronisasi GPS & validasi kehadiran pegawai...
</div>

</div>

</div>

<iframe
id="appFrame"
src="https://script.google.com/a/~/macros/s/AKfycbxMslHJzbFSpyqL9CQVP5_3yEI4iAuxlVwoLDhrIQlJYlAnw3BYTnApwQSLMLcHjhDy/exec"
allow="geolocation *; camera *; microphone *"
sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads"
loading="eager"
referrerpolicy="no-referrer"
allowfullscreen
onload="hideLoader()">
</iframe>

</div>

<script>

function hideLoader(){

setTimeout(() => {

document
.getElementById('loader')
.classList.add('fade-out');

},300);

}

</script>

</body>
</html>
