<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
e Presensi & e Sertifikat Service Excellent PUSPANSA 07-06-2026
</title>

<!-- FAVICON -->
<link rel="icon"
href="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk"
type="image/png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:#050816;
}

.iframe-container{
  position:relative;
  width:100%;
  height:100vh;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  background:white;
}

/* ==========================
   FUTURISTIC SPLASH SCREEN
========================== */

.loader-screen{
  position:absolute;
  inset:0;
  z-index:9999;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;

  background:
  radial-gradient(circle at top left,#071b3d,#050816 65%);

  transition:all .8s ease;
}

/* DIGITAL SCAN EFFECT */

.loader-screen::before{

  content:'';

  position:absolute;
  inset:0;

  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(0,212,255,.08),
    transparent
  );

  animation:scan 4s linear infinite;
}

/* GLOW */

.glow{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:.55;
}

.glow1{
  width:320px;
  height:320px;

  background:#00d4ff;

  top:-120px;
  left:-120px;
}

.glow2{
  width:320px;
  height:320px;

  background:#7c3aed;

  bottom:-120px;
  right:-120px;
}

/* CARD */

.loader-box{

  position:relative;
  z-index:10;

  width:92%;
  max-width:430px;

  padding:45px 30px;

  border-radius:40px;

  text-align:center;

  color:white;

  background:
  rgba(255,255,255,.08);

  backdrop-filter:blur(24px);

  border:
  1px solid rgba(255,255,255,.12);

  box-shadow:
  0 15px 60px rgba(0,0,0,.45);
}

/* LOGO WRAPPER */

.logo-wrapper{

  width:160px;
  height:160px;

  margin:auto;

  border-radius:40px;

  background:
  rgba(255,255,255,.06);

  display:flex;
  justify-content:center;
  align-items:center;

  box-shadow:
  inset 0 0 25px rgba(255,255,255,.06);

  animation:float 3s ease-in-out infinite;
}

/* LOGO CIRCLE */

.logo-circle{

  width:115px;
  height:115px;

  border-radius:50%;

  background:white;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:8px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.3);
}

.logo-circle img{

  width:100%;
  height:100%;

  object-fit:contain;
  border-radius:50%;
}

/* TITLE */

.app-title{

  margin-top:35px;

  font-size:1.25rem;
  font-weight:700;

  line-height:1.6;

  letter-spacing:.4px;
}

/* SUBTITLE */

.subtitle{

  margin-top:16px;

  color:#dbeafe;

  line-height:1.7;

  font-size:.98rem;
}

/* PROGRESS */

.progress{

  width:100%;
  height:14px;

  margin-top:35px;

  background:
  rgba(255,255,255,.12);

  border-radius:999px;

  overflow:hidden;
}

.progress-bar{

  width:45%;
  height:100%;

  border-radius:999px;

  background:
  linear-gradient(
    90deg,
    #00d4ff,
    #7c3aed,
    #22c55e
  );

  animation:loading 2s infinite;
}

/* TEXT */

.loading-text{

  margin-top:22px;

  color:#e0f2fe;

  font-size:1rem;
}

/* FOOTER */

.footer-note{

  margin-top:18px;

  font-size:.82rem;

  color:#94a3b8;
}

/* ANIMATION */

@keyframes loading{

  0%{
    transform:translateX(-100%);
  }

  100%{
    transform:translateX(260%);
  }

}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-12px);
  }

}

@keyframes scan{

  0%{
    transform:translateX(-100%);
  }

  100%{
    transform:translateX(100%);
  }

}

.fade-out{

  opacity:0;
  visibility:hidden;
}

</style>
</head>

<body>

<div class="iframe-container">

  <!-- SPLASH SCREEN -->

  <div class="loader-screen" id="loader">

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="loader-box">

      <div class="logo-wrapper">

        <div class="logo-circle">

          <img
          src="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk"
          alt="Logo Inovasi Digital Puskesmas">

        </div>

      </div>

      <div class="app-title">
        e Presensi & e Sertifikat<br>
        Service Excellent PUSPANSA
      </div>

      <div class="subtitle">
        07 Juni 2026 • Rich Hotel Yogyakarta<br>
        Learning Today, Serving Better Tomorrow
      </div>

      <div class="progress">
        <div class="progress-bar"></div>
      </div>

      <div class="loading-text">
        Memvalidasi kehadiran dan menyiapkan sertifikat digital...
      </div>

      <div class="footer-note">
        Digital Event Platform • Puskesmas Panjatan I
      </div>

    </div>

  </div>

  <!-- WEB APP -->

  <iframe
    src="https://script.google.com/a/~/macros/s/AKfycbz-7p5ZRam8TY3vUd5B19A6ia_rtdiYl3YYZT1azTHbDqXOCVc8UINPqmdZmiDHvBVU9w/exec"
    title="e Presensi & e Sertifikat Service Excellent PUSPANSA"
    allowfullscreen
    onload="hideLoader()">
  </iframe>

</div>

<script>

function hideLoader(){

  const loader =
  document.getElementById('loader');

  setTimeout(()=>{

    loader.classList.add('fade-out');

  },1500);

}

</script>

</body>
</html>
