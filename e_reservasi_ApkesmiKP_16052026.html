<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>e Reservasi Rakor APKESMI KP 16 Mei 2026</title>

  <!-- FAVICON -->
  <link rel="icon"
    href="https://lh3.googleusercontent.com/d/1dcDu5DSWJl2Gk3cl4sgklACvxGnUyVju"
    type="image/png">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:#0f172a;
    }

    .iframe-container{
      position:relative;
      width:100%;
      height:100vh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

    /* =======================
       LOADING SCREEN
    ======================= */

    .loader-screen{
      position:absolute;
      inset:0;
      z-index:9999;

      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
      );

      overflow:hidden;
      transition:all .6s ease;
    }

    /* BACKGROUND EFFECT */

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.25;
    }

    .circle1{
      width:260px;
      height:260px;
      background:#38bdf8;
      top:-80px;
      left:-80px;
    }

    .circle2{
      width:300px;
      height:300px;
      background:#22c55e;
      bottom:-100px;
      right:-80px;
    }

    /* CARD */

    .loader-box{

      position:relative;
      z-index:10;

      width:90%;
      max-width:360px;

      padding:40px 28px;

      border-radius:32px;

      text-align:center;

      background:
      rgba(255,255,255,0.08);

      backdrop-filter:blur(16px);

      box-shadow:
      0 8px 40px rgba(0,0,0,.35),
      inset 0 0 25px rgba(255,255,255,.05);

      color:white;
    }

    /* LOGO */

    .logo-wrapper{

      width:120px;
      height:120px;

      margin:auto;

      border-radius:30px;

      background:
      rgba(255,255,255,0.08);

      display:flex;
      justify-content:center;
      align-items:center;

      animation:float 3s ease-in-out infinite;
    }

    .logo-wrapper img{

      width:80px;
      height:80px;

      object-fit:contain;
      display:block;
    }

    /* TITLE */

    .app-title{

      margin-top:28px;

      font-size:1.15rem;
      font-weight:700;
      line-height:1.6;
    }

    .subtitle{

      margin-top:12px;

      font-size:.95rem;

      color:#dbeafe;
    }

    /* PROGRESS BAR */

    .progress{

      width:100%;
      height:10px;

      margin-top:32px;

      border-radius:999px;

      background:
      rgba(255,255,255,.15);

      overflow:hidden;
    }

    .progress-bar{

      width:40%;
      height:100%;

      border-radius:999px;

      background:
      linear-gradient(
        90deg,
        #38bdf8,
        #22c55e
      );

      animation:loading 1.8s infinite;
    }

    .loading-text{

      margin-top:18px;

      font-size:.9rem;

      color:#f1f5f9;
    }

    /* ANIMATION */

    @keyframes loading{

      0%{
        transform:translateX(-100%);
      }

      100%{
        transform:translateX(300%);
      }

    }

    @keyframes float{

      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

    }

    .fade-out{
      opacity:0;
      visibility:hidden;
    }

  </style>
</head>

<body>

  <div class="iframe-container">

    <!-- LOADING -->
    <div class="loader-screen" id="loader">

      <!-- BACKGROUND -->
      <div class="bg-circle circle1"></div>
      <div class="bg-circle circle2"></div>

      <!-- CARD -->
      <div class="loader-box">

        <!-- LOGO -->
        <div class="logo-wrapper">
          <img
            src="https://lh3.googleusercontent.com/d/1dcDu5DSWJl2Gk3cl4sgklACvxGnUyVju"
            alt="Logo APKESMI">
        </div>

        <!-- TITLE -->
        <div class="app-title">
          e Reservasi Rakor<br>
          APKESMI Kulon Progo
        </div>

        <!-- DATE -->
        <div class="subtitle">
          16 Mei 2026
        </div>

        <!-- PROGRESS -->
        <div class="progress">
          <div class="progress-bar"></div>
        </div>

        <!-- TEXT -->
        <div class="loading-text">
          Memuat aplikasi...
        </div>

      </div>

    </div>

    <!-- WEB APP -->
    <iframe
      src="https://script.google.com/a/~/macros/s/AKfycbyMlpV1RCu50AomYl4OT2PHihpqks94NBmVQKRQDnb4tn0vmx4BkbipTKRDcfpCCL48AQ/exec"
      title="Reservasi APKESMI"
      allowfullscreen
      onload="hideLoader()">
    </iframe>

  </div>

  <script>

    function hideLoader(){

      const loader =
      document.getElementById('loader');

      setTimeout(()=>{

        loader.classList.add('fade-out');

      },1000);

    }

  </script>

</body>
</html>
