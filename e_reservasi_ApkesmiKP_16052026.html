<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>e Reservasi Rakor APKESMI KP 16 Mei 2026</title>

  <!-- Favicon -->
  <link rel="icon"
    href="https://drive.google.com/uc?export=view&id=1dcDu5DSWJl2Gk3cl4sgklACvxGnUyVju"
    type="image/png">

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
      background:#0f172a;
    }

    .iframe-container{
      position:relative;
      width:100%;
      height:100vh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

    /* ===== LOADING SCREEN ===== */

    .loader-screen{
      position:absolute;
      inset:0;
      z-index:9999;

      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
      );

      overflow:hidden;
      transition:all .6s ease;
    }

    /* BACKGROUND BLUR CIRCLE */

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.25;
    }

    .circle1{
      width:250px;
      height:250px;
      background:#38bdf8;
      top:-50px;
      left:-50px;
    }

    .circle2{
      width:300px;
      height:300px;
      background:#22c55e;
      bottom:-100px;
      right:-80px;
    }

    /* BOX */

    .loader-box{
      position:relative;
      z-index:10;

      width:90%;
      max-width:340px;

      text-align:center;

      padding:35px 28px;

      border-radius:30px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(16px);

      box-shadow:
      0 8px 40px rgba(0,0,0,.35),
      inset 0 0 25px rgba(255,255,255,.05);

      color:white;
    }

    /* LOGO */

    .logo-wrapper{
      width:120px;
      height:120px;

      margin:auto;

      border-radius:28px;

      background:rgba(255,255,255,.08);

      display:flex;
      justify-content:center;
      align-items:center;

      animation:float 3s ease-in-out infinite;
    }

    .logo-wrapper img{
      width:78px;
      height:78px;
      object-fit:contain;
    }

    /* TEXT */

    .app-title{
      margin-top:24px;

      font-size:1.2rem;
      font-weight:700;
      line-height:1.5;
    }

    .subtitle{
      margin-top:10px;

      font-size:.92rem;
      color:#cbd5e1;
    }

    /* PROGRESS */

    .progress{
      margin-top:30px;

      width:100%;
      height:10px;

      border-radius:999px;

      background:rgba(255,255,255,.12);

      overflow:hidden;
    }

    .progress-bar{
      width:40%;
      height:100%;

      border-radius:999px;

      background:
      linear-gradient(
        90deg,
        #38bdf8,
        #22c55e
      );

      animation:loading 1.8s infinite;
    }

    .loading-text{
      margin-top:16px;

      font-size:.85rem;
      color:#e2e8f0;

      letter-spacing:.4px;
    }

    /* ANIMATION */

    @keyframes loading{

      0%{
        transform:translateX(-100%);
      }

      100%{
        transform:translateX(300%);
      }

    }

    @keyframes float{

      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

    }

    .fade-out{
      opacity:0;
      visibility:hidden;
    }

  </style>
</head>

<body>

  <div class="iframe-container">

    <!-- LOADING SCREEN -->
    <div class="loader-screen" id="loader">

      <!-- BG EFFECT -->
      <div class="bg-circle circle1"></div>
      <div class="bg-circle circle2"></div>

      <!-- CONTENT -->
      <div class="loader-box">

        <!-- LOGO -->
        <div class="logo-wrapper">
          <img
            src="https://drive.google.com/uc?export=view&id=1dcDu5DSWJl2Gk3cl4sgklACvxGnUyVju"
            alt="Logo APKESMI">
        </div>

        <!-- TITLE -->
        <div class="app-title">
          e Reservasi Rakor<br>
          APKESMI Kulon Progo
        </div>

        <!-- SUBTITLE -->
        <div class="subtitle">
          16 Mei 2026
        </div>

        <!-- PROGRESS -->
        <div class="progress">
          <div class="progress-bar"></div>
        </div>

        <!-- TEXT -->
        <div class="loading-text">
          Memuat aplikasi...
        </div>

      </div>

    </div>

    <!-- WEB APP -->
    <iframe
      src="https://script.google.com/a/~/macros/s/AKfycbyMlpV1RCu50AomYl4OT2PHihpqks94NBmVQKRQDnb4tn0vmx4BkbipTKRDcfpCCL48AQ/exec"
      title="Reservasi APKESMI"
      allowfullscreen
      onload="hideLoader()">
    </iframe>

  </div>

  <script>

    function hideLoader(){

      const loader =
      document.getElementById('loader');

      setTimeout(()=>{

        loader.classList.add('fade-out');

      },1000);

    }

  </script>

</body>
</html>
