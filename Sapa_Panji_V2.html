<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>
SAPA PANJI V2 | Saluran Aspirasi dan Pengaduan Puskesmas Panjatan I
</title>

<link rel="icon"
href="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:#ffffff;
  font-family:'Segoe UI',sans-serif;
}

body{
  position:fixed;
  inset:0;
}

/* FULLSCREEN CONTAINER */

.iframe-container{
  position:fixed;
  inset:0;
  width:100vw;
  height:100dvh;
  background:#ffffff;
  overflow:hidden;
}

/* FULLSCREEN IFRAME */

iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:#ffffff;
}

/* SPLASH SCREEN */

.loader-screen{
  position:fixed;
  inset:0;
  width:100vw;
  height:100dvh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
  linear-gradient(
  135deg,
  #06142d,
  #0f3d7a,
  #0f766e);

  z-index:9999;

  transition:
  opacity .8s ease,
  visibility .8s ease;

  overflow:hidden;
}

.loader-screen::before{
  content:'';

  position:absolute;
  inset:0;

  background:
  linear-gradient(
  90deg,
  transparent,
  rgba(255,255,255,.05),
  transparent);

  animation:scan 5s linear infinite;
}

/* GLOW */

.circle{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:.35;
}

.circle1{
  width:300px;
  height:300px;
  background:#00d4ff;
  top:-120px;
  left:-120px;
}

.circle2{
  width:300px;
  height:300px;
  background:#14b8a6;
  bottom:-120px;
  right:-120px;
}

/* CARD */

.loader-box{

  width:92%;
  max-width:420px;

  padding:32px 24px;

  border-radius:32px;

  text-align:center;

  background:
  rgba(255,255,255,.12);

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(255,255,255,.15);

  color:#fff;

  box-shadow:
  0 15px 50px rgba(0,0,0,.35);

  z-index:2;
}

/* LOGO */

.logo-circle{

  width:90px;
  height:90px;

  margin:0 auto 18px;

  border-radius:50%;

  background:#fff;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:8px;
}

.logo-circle img{

  width:100%;
  height:100%;

  object-fit:contain;

  border-radius:50%;
}

/* TEXT */

.app-title{

  font-size:1.5rem;
  font-weight:700;
}

.subtitle{

  margin-top:10px;

  color:#dbeafe;

  line-height:1.6;
}

.tagline{

  margin-top:10px;

  color:#7dd3fc;

  font-size:.85rem;

  font-weight:600;

  letter-spacing:.5px;

  text-transform:uppercase;
}

/* PROGRESS */

.progress{

  margin-top:24px;

  width:100%;
  height:10px;

  border-radius:999px;

  overflow:hidden;

  background:
  rgba(255,255,255,.15);
}

.progress-bar{

  width:40%;
  height:100%;

  border-radius:999px;

  background:
  linear-gradient(
  90deg,
  #00d4ff,
  #14b8a6);

  animation:loading 2s infinite;
}

.loading-text{

  margin-top:16px;

  color:#e2e8f0;
}

.fade-out{

  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

/* MOBILE */

@media(max-width:600px){

  .loader-box{
    max-width:340px;
    padding:24px 18px;
  }

  .logo-circle{
    width:72px;
    height:72px;
  }

  .app-title{
    font-size:1.2rem;
  }

  .subtitle{
    font-size:.9rem;
  }

  .tagline{
    font-size:.75rem;
  }

  .loading-text{
    font-size:.85rem;
  }

}

/* ANIMATION */

@keyframes loading{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(260%);}
}

@keyframes scan{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

</style>
</head>

<body>

<div class="iframe-container">

<div class="loader-screen" id="loader">

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="loader-box">

<div class="logo-circle">
<img
src="https://lh3.googleusercontent.com/d/1MIRHMi7eVL9qDRNW-SDs4NxR1WXx-ixk"
alt="Logo">
</div>

<div class="app-title">
SAPA PANJI V2
</div>

<div class="subtitle">
Saluran Aspirasi, Pengaduan,<br>
Saran & Inovasi<br>
Puskesmas Panjatan I
</div>

<div class="tagline">
Suara Anda Menginspirasi Perubahan
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="loading-text">
Membangun jembatan komunikasi dan pelayanan yang lebih baik...
</div>

</div>

</div>

<iframe
src="https://script.google.com/a/~/macros/s/AKfycbwRWrby065ZCgATSzSyIWH6Pkqi6euB-eGGsaS9eZ7DW9WZAR--QNfXMnpIznKWIsi8KQ/exec"
title="SAPA PANJI V2"
allowfullscreen
onload="hideLoader()">
</iframe>

</div>

<script>

function hideLoader(){

  const loader =
  document.getElementById('loader');

  setTimeout(()=>{

    loader.classList.add('fade-out');

  },1000);

}

</script>

</body>
</html>
